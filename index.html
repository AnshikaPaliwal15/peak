<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Calculation Dashboard | Performance Metrics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Peak BESS Energy Calculation Dashboard</h1>
        </header>

        <div id="error-message">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            <span id="error-text"></span>
        </div>

        <div class="dashboard-grid">
            <!-- Sidebar: Inputs -->
            <aside class="card input-section">
                <h2>Input Metrics (kWh)</h2>
                <div class="input-group">
                    <label for="generated_energy">Generated Energy</label>
                    <input type="number" id="generated_energy" placeholder="50000.00" min="0" step="any">
                </div>
                <div class="input-group">
                    <label for="total_discharge">Total Discharge</label>
                    <input type="number" id="total_discharge" placeholder="30000.00" min="0" step="any">
                </div>
                <div class="input-group">
                    <label for="total_excess">Total Excess</label>
                    <input type="number" id="total_excess" placeholder="5000.00" min="0" step="any">
                </div>
                <button class="calculate-btn" id="calculate-btn">
                    <div class="spinner" id="btn-spinner"></div>
                    <span id="btn-text">Calculate & Persist</span>
                </button>
            </aside>

            <!-- Main: Results -->
            <main class="card results-section" id="results-section">
                <div class="results-header">
                    <h2>Energy Summary</h2>
                </div>

                <div class="results-grid">
                    <div class="stat-card">
                        <div class="stat-label">Loss & Curtailed</div>
                        <div class="stat-value" id="res-loss-kwh">0</div>
                        <div class="stat-unit">kWh</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Generated</div>
                        <div class="stat-value" id="res-gen-kwh">0</div>
                        <div class="stat-unit">kWh</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Discharge</div>
                        <div class="stat-value" id="res-dis-kwh">0</div>
                        <div class="stat-unit">kWh</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Excess</div>
                        <div class="stat-value" id="res-exc-kwh">0</div>
                        <div class="stat-unit">kWh</div>
                    </div>
                </div>

                <div class="results-grid">
                    <div class="stat-card">
                        <div class="stat-label">Loss & Curtailed</div>
                        <div class="stat-value" id="res-loss-mwh">0</div>
                        <div class="stat-unit">MWh</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Generated</div>
                        <div class="stat-value" id="res-gen-mwh">0</div>
                        <div class="stat-unit">MWh</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Discharge</div>
                        <div class="stat-value" id="res-dis-mwh">0</div>
                        <div class="stat-unit">MWh</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Excess</div>
                        <div class="stat-value" id="res-exc-mwh">0</div>
                        <div class="stat-unit">MWh</div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
